services:
  - type: web
    name: cellik-bot
    runtime: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@10.26.1 --activate && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: WEBHOOK_DOMAIN
        sync: false

databases:
  - name: cellik-db
    plan: free
    databaseName: cellik
    user: cellik
